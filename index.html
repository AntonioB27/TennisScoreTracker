<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tennis Scores</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .match { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>🎾 Tennis Matches</h2>
  <div id="output">Loading...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDo8Ll_ZII4Z95wn5Ka-awA5KdOjQW5iBc",
      authDomain: "tennis-score-tracker-iot.firebaseapp.com",
      databaseURL: "https://tennis-score-tracker-iot-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tennis-score-tracker-iot",
      storageBucket: "tennis-score-tracker-iot.appspot.com",
      messagingSenderId: "418141049736",
      appId: "1:418141049736:web:7ef5037b1b3cff6f45203d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const matchesRef = ref(db, 'matches');
    onValue(matchesRef, (snapshot) => {
      const data = snapshot.val();
      const output = document.getElementById('output');
      output.innerHTML = '';

      for (const id in data) {
        const m = data[id];
        const sets = m.score.sets.map(s => `${s.player1}-${s.player2}`).join(', ');
        output.innerHTML += `
          <div class="match">
            <strong>${m.player1} vs ${m.player2}</strong><br>
            Date: ${m.date}<br>
            Sets: ${sets}<br>
            Status: ${m.status}<br>
            Winner: ${m.winner ?? 'TBD'}
          </div>`;
      }
    });
  </script>
</body>
</html>
